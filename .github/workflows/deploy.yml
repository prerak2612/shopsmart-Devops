name: Terraform + ECS Deploy

on:
  workflow_run:
    workflows: ["Test Pipeline"]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: terraform-ecs-main
  cancel-in-progress: false

jobs:
  deploy:
    name: Terraform Apply, Build, Push, Deploy
    runs-on: ubuntu-latest
    if: >
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      github.event.workflow_run.head_branch == 'main'
    env:
      AWS_REGION: ${{ secrets.AWS_REGION }}
      TF_IN_AUTOMATION: true
      IMAGE_TAG: ${{ github.event.workflow_run.head_sha }}
    steps:
      - name: Checkout tested commit
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Bootstrap Terraform state bucket
        run: |
          ACCOUNT_ID="$(aws sts get-caller-identity --query Account --output text)"
          STATE_BUCKET="shopsmart-tfstate-${ACCOUNT_ID}-${AWS_REGION}"

          echo "TF_STATE_BUCKET=${STATE_BUCKET}" >> "$GITHUB_ENV"

          if aws s3api head-bucket --bucket "${STATE_BUCKET}" 2>/dev/null; then
            echo "Terraform state bucket already exists."
          else
            if [ "${AWS_REGION}" = "us-east-1" ]; then
              aws s3api create-bucket \
                --bucket "${STATE_BUCKET}" \
                --region "${AWS_REGION}"
            else
              aws s3api create-bucket \
                --bucket "${STATE_BUCKET}" \
                --region "${AWS_REGION}" \
                --create-bucket-configuration LocationConstraint="${AWS_REGION}"
            fi
          fi

          aws s3api put-bucket-versioning \
            --bucket "${STATE_BUCKET}" \
            --versioning-configuration Status=Enabled

          aws s3api put-bucket-encryption \
            --bucket "${STATE_BUCKET}" \
            --server-side-encryption-configuration '{"Rules":[{"ApplyServerSideEncryptionByDefault":{"SSEAlgorithm":"AES256"}}]}'

          aws s3api put-public-access-block \
            --bucket "${STATE_BUCKET}" \
            --public-access-block-configuration BlockPublicAcls=true,IgnorePublicAcls=true,BlockPublicPolicy=true,RestrictPublicBuckets=true

      - name: Terraform init
        working-directory: infra
        run: |
          terraform init \
            -backend-config="bucket=${TF_STATE_BUCKET}" \
            -backend-config="key=shopsmart/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}"

      - name: Terraform validate
        working-directory: infra
        run: terraform validate

      - name: Terraform plan
        working-directory: infra
        run: terraform plan -input=false -out=tfplan -var="aws_region=${AWS_REGION}"

      - name: Terraform apply
        working-directory: infra
        run: terraform apply -input=false -auto-approve tfplan

      - name: Export Terraform outputs
        id: terraform-outputs
        working-directory: infra
        run: |
          echo "ECR_REPOSITORY_URL=$(terraform output -raw ecr_repository_url)" >> "$GITHUB_ENV"
          echo "ECS_CLUSTER_NAME=$(terraform output -raw ecs_cluster_name)" >> "$GITHUB_ENV"
          echo "ECS_SERVICE_NAME=$(terraform output -raw ecs_service_name)" >> "$GITHUB_ENV"
          echo "ECS_TASK_FAMILY=$(terraform output -raw ecs_task_family)" >> "$GITHUB_ENV"
          echo "ECS_CONTAINER_NAME=$(terraform output -raw ecs_container_name)" >> "$GITHUB_ENV"
          echo "ECS_EXECUTION_ROLE_ARN=$(terraform output -raw ecs_execution_role_arn)" >> "$GITHUB_ENV"
          echo "ECS_TASK_ROLE_ARN=$(terraform output -raw ecs_task_role_arn)" >> "$GITHUB_ENV"
          echo "ECS_LOG_GROUP_NAME=$(terraform output -raw ecs_log_group_name)" >> "$GITHUB_ENV"
          echo "ALB_DNS_NAME=$(terraform output -raw alb_dns_name)" >> "$GITHUB_ENV"

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build Docker image
        run: docker build -t "${ECR_REPOSITORY_URL}:${IMAGE_TAG}" .

      - name: Push Docker image
        run: docker push "${ECR_REPOSITORY_URL}:${IMAGE_TAG}"

      - name: Prepare ECS task definition
        run: |
          IMAGE_URI="${ECR_REPOSITORY_URL}:${IMAGE_TAG}"
          sed \
            -e "s|__TASK_FAMILY__|${ECS_TASK_FAMILY}|g" \
            -e "s|__EXECUTION_ROLE_ARN__|${ECS_EXECUTION_ROLE_ARN}|g" \
            -e "s|__TASK_ROLE_ARN__|${ECS_TASK_ROLE_ARN}|g" \
            -e "s|__CONTAINER_NAME__|${ECS_CONTAINER_NAME}|g" \
            -e "s|__IMAGE_URI__|${IMAGE_URI}|g" \
            -e "s|__LOG_GROUP_NAME__|${ECS_LOG_GROUP_NAME}|g" \
            -e "s|__AWS_REGION__|${AWS_REGION}|g" \
            .aws/ecs-task-definition.json.tpl > .aws/ecs-task-definition.generated.json

      - name: Render task definition with new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: .aws/ecs-task-definition.generated.json
          container-name: ${{ env.ECS_CONTAINER_NAME }}
          image: ${{ env.ECR_REPOSITORY_URL }}:${{ env.IMAGE_TAG }}

      - name: Deploy task definition to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ env.ECS_SERVICE_NAME }}
          cluster: ${{ env.ECS_CLUSTER_NAME }}
          wait-for-service-stability: false

      - name: Scale ECS service to one running task
        run: |
          aws ecs update-service \
            --cluster "${ECS_CLUSTER_NAME}" \
            --service "${ECS_SERVICE_NAME}" \
            --desired-count 1 \
            --force-new-deployment

      - name: Wait for service stability
        run: aws ecs wait services-stable --cluster "${ECS_CLUSTER_NAME}" --services "${ECS_SERVICE_NAME}"

      - name: Show deployed endpoint
        run: echo "ShopSmart is available at http://${ALB_DNS_NAME}"
