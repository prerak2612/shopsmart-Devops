name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      # Guard: skip the entire deploy when secrets are not configured.
      # This prevents a red failure on forks or before secrets are added.
      - name: Check required secrets
        id: secrets-check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || \
             [ -z "${{ secrets.EC2_USER }}" ] || \
             [ -z "${{ secrets.EC2_SSH_KEY }}" ] || \
             [ -z "${{ secrets.EC2_APP_DIR }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  EC2 secrets not configured — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH
        if: steps.secrets-check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.EC2_APP_DIR }}"
            bash "$APP_DIR/scripts/deploy.sh"
