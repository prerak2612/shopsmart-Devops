name: CI/CD Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ── Job 1: Lint (client ESLint + Prettier, server ESLint + Prettier) ────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Lint client (ESLint)
        run: npm run lint
        working-directory: client

      - name: Check client formatting (Prettier)
        run: npm run format:check
        working-directory: client

      - name: Lint server (ESLint)
        run: npm run lint
        working-directory: server

      - name: Check server formatting (Prettier)
        run: npm run format:check
        working-directory: server

  # ── Job 2: Client unit tests ─────────────────────────────────────────────────
  client-unit-tests:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run unit tests
        run: npm run test:unit

  # ── Job 3: Client integration tests ──────────────────────────────────────────
  client-integration-tests:
    name: Client Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run integration tests
        run: npm run test:integration

  # ── Job 4: Server tests ───────────────────────────────────────────────────────
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run server tests
        run: npm test

  # ── Job 5: E2E tests (Playwright) ────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [client-unit-tests, client-integration-tests]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30

  # ── Job 6: Deploy to AWS EC2 (main branch only) ───────────────────────────────
  #
  # Required GitHub Secrets:
  #   EC2_HOST     — public IP or hostname of the EC2 instance
  #   EC2_USER     — SSH username (e.g. ubuntu, ec2-user)
  #   EC2_SSH_KEY  — private key PEM contents
  #   EC2_APP_DIR  — absolute path to the app on EC2 (e.g. /home/ubuntu/shopsmart)
  deploy:
    name: Deploy to EC2
    runs-on: ubuntu-latest
    needs: [lint, client-unit-tests, client-integration-tests, server-tests, e2e-tests]
    # Only deploy from the main branch — not from PRs or feature branches.
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4

      # Guard: skip deploy if EC2 secrets are not yet configured.
      # Prevents a red failure on repos where EC2 isn't set up.
      - name: Check required secrets
        id: secrets-check
        run: |
          if [ -z "${{ secrets.EC2_HOST }}" ] || \
             [ -z "${{ secrets.EC2_USER }}" ] || \
             [ -z "${{ secrets.EC2_SSH_KEY }}" ] || \
             [ -z "${{ secrets.EC2_APP_DIR }}" ]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  EC2 secrets not configured — skipping deploy."
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Deploy via SSH to EC2
        if: steps.secrets-check.outputs.skip == 'false'
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          port: 22
          script_stop: true
          script: |
            export APP_DIR="${{ secrets.EC2_APP_DIR }}"
            bash "$APP_DIR/scripts/deploy.sh"

