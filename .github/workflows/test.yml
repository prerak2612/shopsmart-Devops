name: Test Pipeline

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  # ── Job 1: Lint (client ESLint + Prettier, server ESLint + Prettier) ────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            client/package-lock.json
            server/package-lock.json

      - name: Install client dependencies
        run: npm ci
        working-directory: client

      - name: Install server dependencies
        run: npm ci
        working-directory: server

      - name: Lint client (ESLint)
        run: npm run lint
        working-directory: client

      - name: Check client formatting (Prettier)
        run: npm run format:check
        working-directory: client

      - name: Lint server (ESLint)
        run: npm run lint
        working-directory: server

      - name: Check server formatting (Prettier)
        run: npm run format:check
        working-directory: server

  # ── Job 2: Client unit tests ─────────────────────────────────────────────────
  client-unit-tests:
    name: Client Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create unit test report directory
        run: mkdir -p reports

      - name: Run unit tests
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=reports/unit-test-report.xml src/__tests__/unit/

      - name: Upload unit test report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: unit-test-report
          path: client/reports/unit-test-report.xml
          retention-days: 30

  # ── Job 3: Client integration tests ──────────────────────────────────────────
  client-integration-tests:
    name: Client Integration Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create integration test report directory
        run: mkdir -p reports

      - name: Run integration tests
        run: npx vitest run --reporter=verbose --reporter=junit --outputFile.junit=reports/integration-test-report.xml src/__tests__/integration/

      - name: Upload integration test report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: integration-test-report
          path: client/reports/integration-test-report.xml
          retention-days: 30

  # ── Job 4: Server tests ───────────────────────────────────────────────────────
  server-tests:
    name: Server Tests
    runs-on: ubuntu-latest
    needs: lint
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Create server test report directories
        run: |
          mkdir -p reports
          mkdir -p coverage

      - name: Run server tests
        run: npx jest --json --outputFile=reports/server-test-report.json --coverage --coverageDirectory=coverage

      - name: Upload server test report
        uses: actions/upload-artifact@v4
        if: ${{ always() }}
        with:
          name: server-test-report
          path: |
            server/reports/server-test-report.json
            server/coverage/
          retention-days: 30

  # ── Job 5: E2E tests (Playwright) ────────────────────────────────────────────
  e2e-tests:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [client-unit-tests, client-integration-tests]
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: client/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: client/playwright-report/
          retention-days: 30
